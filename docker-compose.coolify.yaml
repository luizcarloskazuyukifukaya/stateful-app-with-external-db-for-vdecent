services:
  app:
    # Coolify handles the domain/proxy, so no 'ports' mapping is needed here.
    # It will automatically detect the internal port 80.
    labels:
      - "coolify.managed=true"

  sidecar:
    # Internal port 8000 is used for backup/restore APIs.
    # If you want to access sidecar APIs via a domain, 
    # you can add Coolify labels or expose it.
    labels:
      - "coolify.managed=true"
