services:
  app:
    build: .
    restart: always
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/activitylog
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=activitylog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d activitylog"]
      interval: 5s
      timeout: 5s
      retries: 5

  sidecar:
    build: ./sidecar
    restart: always
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/activitylog
      - BACKUP_INTERVAL_MINS=${BACKUP_INTERVAL_MINS:-5}
      - BACKUP_RETENTION_COUNT=${BACKUP_RETENTION_COUNT}
      - RESTORE_AUTH_TOKEN=${RESTORE_AUTH_TOKEN}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - GOOGLE_CREDENTIALS_PATH=/app/credentials.json
      - GOOGLE_TOKEN_PATH=/app/token.json
      - GOOGLE_API_CREDENTIALS_B64=${GOOGLE_API_CREDENTIALS_B64}
      - GOOGLE_API_TOKEN_B64=${GOOGLE_API_TOKEN_B64}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
